<!DOCTYPE html>
<html lang="en">
<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>ClassroomGPT</title>
   <style>
       * {
           margin: 0;
           padding: 0;
           box-sizing: border-box;
       }

       body {
           background: #000000;
           color: #fff;
           font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
           height: 100vh;
           overflow: hidden;
           display: flex;
           flex-direction: column;
       }

       body::before {
           content: '';
           position: fixed;
           top: 0;
           left: 0;
           width: 100%;
           height: 100%;
           background-image: 
               linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
               linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
           background-size: 50px 50px;
           pointer-events: none;
           z-index: 0;
       }

       .header {
           padding: 20px;
           text-align: center;
           border-bottom: 1px solid rgba(255, 255, 255, 0.1);
           position: relative;
           z-index: 1;
           background: rgba(0, 0, 0, 0.8);
           backdrop-filter: blur(10px);
       }

       .logo {
           font-size: 2.5rem;
           font-weight: bold;
           letter-spacing: 4px;
           text-transform: uppercase;
           color: #fff;
           text-shadow:
               0 0 5px rgba(255, 255, 255, 0.8),
               0 0 10px rgba(255, 255, 255, 0.8),
               0 0 20px rgba(255, 255, 255, 0.8),
               0 0 40px rgba(255, 255, 255, 0.6),
               0 0 80px rgba(255, 255, 255, 0.4);
           animation: travelersPulse 2s ease-in-out infinite alternate;
       }

       @keyframes travelersPulse {
           from {
               text-shadow:
                   0 0 5px rgba(255, 255, 255, 0.8),
                   0 0 10px rgba(255, 255, 255, 0.8),
                   0 0 20px rgba(255, 255, 255, 0.8),
                   0 0 40px rgba(255, 255, 255, 0.6),
                   0 0 80px rgba(255, 255, 255, 0.4);
           }
           to {
               text-shadow:
                   0 0 10px rgba(255, 255, 255, 1),
                   0 0 20px rgba(255, 255, 255, 1),
                   0 0 40px rgba(255, 255, 255, 0.9),
                   0 0 80px rgba(255, 255, 255, 0.7),
                   0 0 120px rgba(255, 255, 255, 0.5);
           }
       }

       .subtitle {
           margin-top: 8px;
           font-size: 0.9rem;
           color: rgba(255, 255, 255, 0.6);
           letter-spacing: 2px;
       }

       .chat-container {
           flex: 1;
           overflow-y: auto;
           padding: 20px;
           display: flex;
           flex-direction: column;
           gap: 15px;
           position: relative;
           z-index: 1;
           max-width: 900px;
           width: 100%;
           margin: 0 auto;
       }

       .chat-container::-webkit-scrollbar {
           width: 8px;
       }

       .chat-container::-webkit-scrollbar-track {
           background: rgba(255, 255, 255, 0.05);
       }

       .chat-container::-webkit-scrollbar-thumb {
           background: rgba(255, 255, 255, 0.2);
           border-radius: 4px;
       }

       .chat-container::-webkit-scrollbar-thumb:hover {
           background: rgba(255, 255, 255, 0.3);
       }

       .message {
           max-width: 80%;
           padding: 15px 20px;
           border-radius: 12px;
           line-height: 1.6;
           animation: fadeIn 0.3s ease;
           position: relative;
       }

       @keyframes fadeIn {
           from { opacity: 0; transform: translateY(10px); }
           to { opacity: 1; transform: translateY(0); }
       }

       .user-message {
           align-self: flex-end;
           background: rgba(255, 255, 255, 0.1);
           border: 1px solid rgba(255, 255, 255, 0.2);
           color: #fff;
       }

       .ai-message {
           align-self: flex-start;
           background: rgba(255, 255, 255, 0.05);
           border: 1px solid rgba(255, 255, 255, 0.1);
           color: #fff;
       }

       .ai-message::before {
           content: 'ClassroomGPT';
           display: block;
           font-size: 0.75rem;
           color: rgba(255, 255, 255, 0.5);
           margin-bottom: 5px;
           letter-spacing: 1px;
       }

       .input-container {
           padding: 20px;
           border-top: 1px solid rgba(255, 255, 255, 0.1);
           background: rgba(0, 0, 0, 0.9);
           position: relative;
           z-index: 1;
       }

       .input-wrapper {
           max-width: 900px;
           margin: 0 auto;
           display: flex;
           gap: 10px;
           align-items: flex-end;
       }

       .input-field {
           flex: 1;
           background: rgba(255, 255, 255, 0.05);
           border: 1px solid rgba(255, 255, 255, 0.2);
           border-radius: 12px;
           padding: 15px;
           color: #fff;
           font-size: 1rem;
           resize: none;
           min-height: 50px;
           max-height: 150px;
           outline: none;
           transition: all 0.3s;
       }

       .input-field:focus {
           border-color: rgba(255, 255, 255, 0.5);
           box-shadow: 0 0 20px rgba(255, 255, 255, 0.1);
       }

       .input-field::placeholder {
           color: rgba(255, 255, 255, 0.4);
       }

       .send-btn {
           background: transparent;
           border: 1px solid rgba(255, 255, 255, 0.3);
           color: #fff;
           padding: 15px 25px;
           border-radius: 12px;
           cursor: pointer;
           font-size: 1rem;
           transition: all 0.3s;
           text-transform: uppercase;
           letter-spacing: 1px;
           font-weight: bold;
       }

       .send-btn:hover {
           background: rgba(255, 255, 255, 0.1);
           border-color: rgba(255, 255, 255, 0.8);
           box-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
           text-shadow: 0 0 10px rgba(255, 255, 255, 0.8);
       }

       .send-btn:disabled {
           opacity: 0.5;
           cursor: not-allowed;
       }

       .typing-indicator {
           display: none;
           align-self: flex-start;
           padding: 15px 20px;
           background: rgba(255, 255, 255, 0.05);
           border: 1px solid rgba(255, 255, 255, 0.1);
           border-radius: 12px;
           margin-bottom: 10px;
       }

       .typing-indicator.active {
           display: flex;
           gap: 5px;
       }

       .dot {
           width: 8px;
           height: 8px;
           background: rgba(255, 255, 255, 0.6);
           border-radius: 50%;
           animation: bounce 1.4s infinite ease-in-out both;
       }

       .dot:nth-child(1) { animation-delay: -0.32s; }
       .dot:nth-child(2) { animation-delay: -0.16s; }

       @keyframes bounce {
           0%, 80%, 100% { transform: scale(0); }
           40% { transform: scale(1); }
       }

       pre {
           background: rgba(0, 0, 0, 0.5);
           border: 1px solid rgba(255, 255, 255, 0.1);
           border-radius: 8px;
           padding: 15px;
           overflow-x: auto;
           margin: 10px 0;
       }

       code {
           font-family: 'Courier New', monospace;
           color: #fff;
           text-shadow: 0 0 5px rgba(255, 255, 255, 0.3);
       }

       @media (max-width: 600px) {
           .logo { font-size: 1.8rem; }
           .message { max-width: 90%; }
       }
   </style>
</head>
<body>
   <div class="header">
       <div class="logo">ClassroomGPT</div>
       <div class="subtitle">AI-Powered Learning Assistant</div>
   </div>

   <div class="chat-container" id="chatContainer">
       <div class="message ai-message">
           Hello! I'm ClassroomGPT. I can help you with math problems, answer questions, and have general conversations. What would you like to explore today?
       </div>
   </div>

   <div class="typing-indicator" id="typingIndicator">
       <div class="dot"></div>
       <div class="dot"></div>
       <div class="dot"></div>
   </div>

   <div class="input-container">
       <div class="input-wrapper">
           <textarea class="input-field" id="userInput" placeholder="Ask me anything..." rows="1"></textarea>
           <button class="send-btn" id="sendBtn" onclick="sendMessage()">Send</button>
       </div>
   </div>

   <script>
       const API_KEY = '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';
       const chatContainer = document.getElementById('chatContainer');
       const userInput = document.getElementById('userInput');
       const sendBtn = document.getElementById('sendBtn');
       const typingIndicator = document.getElementById('typingIndicator');

       userInput.addEventListener('input', function() {
           this.style.height = 'auto';
           this.style.height = Math.min(this.scrollHeight, 150) + 'px';
       });

       userInput.addEventListener('keydown', function(e) {
           if (e.key === 'Enter' && !e.shiftKey) {
               e.preventDefault();
               sendMessage();
           }
       });

       async function sendMessage() {
           const message = userInput.value.trim();
           if (!message) return;

           addMessage(message, 'user');
           userInput.value = '';
           userInput.style.height = 'auto';
           
           typingIndicator.classList.add('active');
           sendBtn.disabled = true;

           try {
               const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                   method: 'POST',
                   headers: {
                       'Authorization': `Bearer ${API_KEY}`,
                       'Content-Type': 'application/json'
                   },
                   body: JSON.stringify({
                       model: 'llama-3.3-70b-versatile',
                       messages: [
                           {
                               role: 'system',
                               content: 'You are ClassroomGPT, a helpful AI assistant. You excel at answering math questions and can also engage in general conversation. Provide clear, educational responses.'
                           },
                           {
                               role: 'user',
                               content: message
                           }
                       ],
                       temperature: 0.7,
                       max_tokens: 2048
                   })
               });

               const data = await response.json();
               
               if (data.choices && data.choices[0]) {
                   const aiResponse = data.choices[0].message.content;
                   addMessage(formatResponse(aiResponse), 'ai');
               } else {
                   addMessage('Sorry, I encountered an error. Please try again.', 'ai');
               }
           } catch (error) {
               addMessage('Sorry, I encountered an error connecting to the server. Please try again.', 'ai');
               console.error('Error:', error);
           } finally {
               typingIndicator.classList.remove('active');
               sendBtn.disabled = false;
           }
       }

       function addMessage(text, sender) {
           const messageDiv = document.createElement('div');
           messageDiv.className = `message ${sender}-message`;
           messageDiv.innerHTML = text;
           chatContainer.appendChild(messageDiv);
           chatContainer.scrollTop = chatContainer.scrollHeight;
       }

       function formatResponse(text) {
           return text
               .replace(/```([\s\S]*?)```/g, '<pre><code>$1</code></pre>')
               .replace(/`([^`]+)`/g, '<code>$1</code>')
               .replace(/\n/g, '<br>');
       }
   </script>
</body>
</html>
