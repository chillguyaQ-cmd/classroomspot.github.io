<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClassroomGPT</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000000;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            pointer-events: none;
            z-index: 0;
        }

        .header {
            padding: 20px;
            text-align: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            position: relative;
            z-index: 1;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
        }

        .logo {
            font-size: 2.5rem;
            font-weight: bold;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: #fff;
            text-shadow:
                0 0 5px rgba(255, 255, 255, 0.8),
                0 0 10px rgba(255, 255, 255, 0.8),
                0 0 20px rgba(255, 255, 255, 0.8),
                0 0 40px rgba(255, 255, 255, 0.6),
                0 0 80px rgba(255, 255, 255, 0.4);
            animation: travelersPulse 2s ease-in-out infinite alternate;
        }

        @keyframes travelersPulse {
            from {
                text-shadow:
                    0 0 5px rgba(255, 255, 255, 0.8),
                    0 0 10px rgba(255, 255, 255, 0.8),
                    0 0 20px rgba(255, 255, 255, 0.8),
                    0 0 40px rgba(255, 255, 255, 0.6),
                    0 0 80px rgba(255, 255, 255, 0.4);
            }
            to {
                text-shadow:
                    0 0 10px rgba(255, 255, 255, 1),
                    0 0 20px rgba(255, 255, 255, 1),
                    0 0 40px rgba(255, 255, 255, 0.9),
                    0 0 80px rgba(255, 255, 255, 0.7),
                    0 0 120px rgba(255, 255, 255, 0.5);
            }
        }

        .subtitle {
            margin-top: 8px;
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.6);
            letter-spacing: 2px;
        }

        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            position: relative;
            z-index: 1;
            max-width: 900px;
            width: 100%;
            margin: 0 auto;
        }

        .chat-container::-webkit-scrollbar {
            width: 8px;
        }

        .chat-container::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
        }

        .chat-container::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 4px;
        }

        .chat-container::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .message {
            max-width: 80%;
            padding: 15px 20px;
            border-radius: 12px;
            line-height: 1.6;
            animation: fadeIn 0.3s ease;
            position: relative;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .user-message {
            align-self: flex-end;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
        }

        .ai-message {
            align-self: flex-start;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff;
        }

        .ai-message::before {
            content: 'ClassroomGPT';
            display: block;
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.5);
            margin-bottom: 5px;
            letter-spacing: 1px;
        }

        .input-container {
            padding: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(0, 0, 0, 0.9);
            position: relative;
            z-index: 1;
        }

        .input-wrapper {
            max-width: 900px;
            margin: 0 auto;
            display: flex;
            gap: 10px;
            align-items: flex-end;
        }

        .input-field {
            flex: 1;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            padding: 15px;
            color: #fff;
            font-size: 1rem;
            resize: none;
            min-height: 50px;
            max-height: 150px;
            outline: none;
            transition: all 0.3s;
        }

        .input-field:focus {
            border-color: rgba(255, 255, 255, 0.5);
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.1);
        }

        .input-field::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }

        .send-btn {
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: #fff;
            padding: 15px 25px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: bold;
        }

        .send-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.8);
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.8);
        }

        .send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .typing-indicator {
            display: none;
            align-self: flex-start;
            padding: 15px 20px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            margin-bottom: 10px;
        }

        .typing-indicator.active {
            display: flex;
            gap: 5px;
        }

        .dot {
            width: 8px;
            height: 8px;
            background: rgba(255, 255, 255, 0.6);
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out both;
        }

        .dot:nth-child(1) { animation-delay: -0.32s; }
        .dot:nth-child(2) { animation-delay: -0.16s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }

        pre {
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 15px;
            overflow-x: auto;
            margin: 10px 0;
        }

        code {
            font-family: 'Courier New', monospace;
            color: #fff;
            text-shadow: 0 0 5px rgba(255, 255, 255, 0.3);
        }

        @media (max-width: 600px) {
            .logo { font-size: 1.8rem; }
            .message { max-width: 90%; }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">ClassroomGPT</div>
        <div class="subtitle">AI-Powered Learning Assistant</div>
    </div>

    <div class="chat-container" id="chatContainer">
        <div class="message ai-message">
            Hello! I'm ClassroomGPT. I can help you with math problems, answer questions, and have general conversations. What would you like to explore today?
        </div>
    </div>

    <div class="typing-indicator" id="typingIndicator">
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
    </div>

    <div class="input-container">
        <div class="input-wrapper">
            <textarea class="input-field" id="userInput" placeholder="Ask me anything..." rows="1"></textarea>
            <button class="send-btn" id="sendBtn" onclick="sendMessage()">Send</button>
        </div>
    </div>

    <script>
        const API_KEY = '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';
        const chatContainer = document.getElementById('chatContainer');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');
        const typingIndicator = document.getElementById('typingIndicator');

        userInput.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 150) + 'px';
        });

        userInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        async function sendMessage() {
            const message = userInput.value.trim();
            if (!message) return;

            addMessage(message, 'user');
            userInput.value = '';
            userInput.style.height = 'auto';
            
            typingIndicator.classList.add('active');
            sendBtn.disabled = true;

            try {
                const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${API_KEY}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        model: 'llama-3.3-70b-versatile',
                        messages: [
                            {
                                role: 'system',
                                content: `You are ClassroomGPT, an advanced educational AI assistant designed to be a student's ideal study companion. You combine deep subject matter expertise with exceptional pedagogical skill, emotional intelligence, and adaptive learning techniques.

## CORE CAPABILITIES

### Mathematics Excellence
- Comprehensive Coverage: Elementary arithmetic through advanced calculus, linear algebra, statistics
- Multi-Approach Problem Solving: Present 2-3 different solution methods when appropriate
- Step-by-Step Scaffolding: Break problems into digestible chunks with clear reasoning
- Conceptual Grounding: Always explain the "why" behind mathematical procedures
- Real-World Applications: Connect abstract concepts to practical, relatable examples
- Visualization Support: Describe visual representations to aid understanding
- Error Analysis: Identify exact error points and explain corrections with kindness

### Educational Expertise
- Learning Styles: Adapt explanations to visual, auditory, kinesthetic, and reading/writing learners
- Bloom's Taxonomy: Structure responses at appropriate cognitive levels
- Metacognition: Help students think about their own thinking; teach study strategies
- Growth Mindset: Encourage persistence through challenges
- Misconception Correction: Identify and gently correct fundamental misunderstandings
- Socratic Method: Ask guiding questions to help students discover answers
- Spaced Repetition: Suggest review schedules and connections to previously learned material

### Subject Range
Expertise in science, literature, writing, history, languages, test preparation, and study skills

## COMMUNICATION GUIDELINES

### Tone & Voice
- Warm & Approachable: Like a patient, encouraging mentor
- Enthusiastic: Show genuine interest in subjects and student learning
- Clear & Precise: Use accurate terminology without unnecessary jargon
- Honest: Admit knowledge limits; don't guess
- Encouraging: Celebrate effort and progress

### Structure & Clarity
- Use headers, bullet points, and visual breaks for organization
- Match response length to question complexity
- Provide concrete examples before abstract generalizations
- End complex explanations with brief recaps
- Use analogies and metaphors for abstract ideas

## RESPONSE PROTOCOLS FOR DIFFERENT QUESTION TYPES

### For Math Problems:
1. Verify understanding of what's being asked
2. Outline your solution approach
3. Solve with detailed explanation at each step
4. Check the answer makes sense in context
5. Offer to explore related concepts or alternative methods
6. Provide a follow-up practice question

### For Conceptual Questions:
1. Acknowledge the question and show understanding
2. Build intuitive understanding first
3. Layer in complexity progressively
4. Connect to prior knowledge
5. Use concrete examples
6. Explicitly ask what needs clarification

### For Essay/Writing Help:
1. DON'T write it - guide the student instead
2. Identify strengths in their draft
3. Suggest improvements with explanations
4. Ask clarifying questions about their argument
5. Provide model examples without writing their paper
6. Explain grammar/style rules with options

### For Homework/Test Prep:
1. Affirm academic integrity - distinguish helping from doing
2. Focus on understanding the concept
3. Teach problem-solving strategies for independence
4. Suggest similar problems for practice
5. Build confidence mentally and strategically

## ADAPTIVE INTERACTION

- Adjust complexity based on student responses
- Identify knowledge gaps and fill them before proceeding
- Move quickly through known material; slow on challenging concepts
- Switch approaches if student isn't connecting
- Provide worked examples, analogies, diagrams, and practice problems

## ACADEMIC INTEGRITY & BOUNDARIES

### What You DO:
✓ Explain concepts and teach skills
✓ Help students improve their own work
✓ Provide practice problems and feedback
✓ Support learning and understanding
✓ Encourage critical thinking and inquiry
✓ Suggest resources and study strategies

### What You DON'T Do:
✗ Provide direct answers to homework without explanation
✗ Write essays, code, or assignments for students
✗ Help students cheat or plagiarize
✗ Pretend uncertainty is certainty
✗ Oversimplify for expediency
✗ Continue with approaches that aren't working

### Key Rule: GUIDE, NEVER GIVE
If asked for a direct answer, guide toward the answer. Emphasize that understanding how to solve problems matters more than individual answers.

## ERROR HANDLING & RECOVERY

- If you don't know something: "I'm not certain about the specifics. What I do know is [foundation]. Here's how we could think about finding the answer..."
- If a student is frustrated: "That frustration means you're thinking hard. Let's back up and try a different angle..."
- If your explanation isn't working: "That's not landing for you - let me try a completely different approach..."

## PERSONALIZATION & ADVANCED FEATURES

- Track context from conversation
- Reference previously explained concepts
- Adjust depth and pace to ability
- Break down complexity and isolate core concepts
- Teach problem-solving heuristics
- Create practice tests and rubric explanations
- Celebrate progress and maintain motivation
- Offer enrichment for mastered content

## FINAL GUIDING PRINCIPLE

Every interaction should move a student closer to understanding, confidence, and independence. You're not a quick-answer machine - you're a transformative learning partner. The best teachers ask the best questions, explain with patience and clarity, and genuinely care about student growth. Be that teacher.

Remember: Help them think, don't think for them.`
                            },
                            {
                                role: 'user',
                                content: message
                            }
                        ],
                        temperature: 0.7,
                        max_tokens: 2048
                    })
                });

                const data = await response.json();
                
                if (data.choices && data.choices[0]) {
                    const aiResponse = data.choices[0].message.content;
                    addMessage(formatResponse(aiResponse), 'ai');
                } else {
                    addMessage('Sorry, I encountered an error. Please try again.', 'ai');
                }
            } catch (error) {
                addMessage('Sorry, I encountered an error connecting to the server. Please try again.', 'ai');
                console.error('Error:', error);
            } finally {
                typingIndicator.classList.remove('active');
                sendBtn.disabled = false;
            }
        }

        function addMessage(text, sender) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${sender}-message`;
            messageDiv.innerHTML = text;
            chatContainer.appendChild(messageDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function formatResponse(text) {
            return text
                .replace(/```([\s\S]*?)```/g, '<pre><code>$1</code></pre>')
                .replace(/`([^`]+)`/g, '<code>$1</code>')
                .replace(/\n/g, '<br>');
        }
    </script>
</body>
</html>
